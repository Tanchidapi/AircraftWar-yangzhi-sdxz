name: Build Android APK

# 触发条件：push到main/master分支，或手动触发
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AircraftWarAndroid

    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 设置 Gradle（指定版本 8.0，与 AGP 8.1.0 兼容）
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    # 4. 生成 Gradle Wrapper（使用指定版本的 Gradle）
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.0

    # 5. 赋予 gradlew 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 6. 构建 Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # 7. 上传 Debug APK 产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AircraftWar-debug-apk
        path: AircraftWarAndroid/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    # 8. 构建 Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    # 9. 上传 Release APK 产物
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: AircraftWar-release-apk
        path: AircraftWarAndroid/app/build/outputs/apk/release/*.apk
        retention-days: 30